services:
  api:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE in .env.production}
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No volume mounts in production — use the built image

  db:
    image: postgres:15-alpine
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    # No port mapping — only accessible via internal Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE in .env.production}
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migration

volumes:
  postgres_data:
